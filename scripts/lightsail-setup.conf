#!/bin/bash
# AI Chat Bot Pro — AWS Lightsail complete setup
# Fresh Ubuntu 22.04 LTS, run as root.
#
# USAGE:
#   1. Create scripts/lightsail-setup.conf with your credentials (see below)
#   2. bash scripts/lightsail-setup.sh
#
# OR pass values inline:
#   DB_PASS=xxx ENCRYPTION_SECRET=xxx DOMAIN=xxx ADMIN_EMAIL=xxx bash scripts/lightsail-setup.sh

set -euo pipefail

SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
CONF="$SCRIPT_DIR/lightsail-setup.conf"
if [ -f "$CONF" ]; then source "$CONF"; fi

APP_DIR="${APP_DIR:-/opt/aichatbotpro}"
REPO="${REPO:-https://github.com/wajahatk/aichatbotpro.git}"
DB_USER="${DB_USER:-aichatbot}"
DB_NAME="${DB_NAME:-aichatbotpro}"

die() { echo "ERROR: $1" >&2; exit 1; }
log() { echo -e "\n\033[1;32m=== $1 ===\033[0m"; }

[ -z "${DB_PASS:-}"           ] && die "DB_PASS is required."
[ -z "${ENCRYPTION_SECRET:-}" ] && die "ENCRYPTION_SECRET is required (must be exactly 32 chars)."
[ -z "${DOMAIN:-}"            ] && die "DOMAIN is required (e.g. aichatbotpro.com.au)."
[ -z "${ADMIN_EMAIL:-}"       ] && die "ADMIN_EMAIL is required."
[ ${#ENCRYPTION_SECRET} -ne 32 ] && die "ENCRYPTION_SECRET must be exactly 32 chars (got ${#ENCRYPTION_SECRET})."

log "1. System packages"
apt-get update -y
apt-get install -y curl git nginx unzip build-essential \
  postgresql postgresql-contrib certbot python3-certbot-nginx

log "2. Node.js 24"
curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
apt-get install -y nodejs
node --version

log "3. Bun 1.3.9"
curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.9"
export BUN_INSTALL="$HOME/.bun"
export PATH="$BUN_INSTALL/bin:$PATH"
bun --version

log "4. PM2"
npm install -g pm2
pm2 --version

log "5. PostgreSQL"
systemctl enable postgresql
systemctl start postgresql
sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='${DB_USER}'" | grep -q 1 || \
  sudo -u postgres psql -c "CREATE USER ${DB_USER} WITH PASSWORD '${DB_PASS}';"
sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='${DB_NAME}'" | grep -q 1 || \
  sudo -u postgres psql -c "CREATE DATABASE ${DB_NAME} OWNER ${DB_USER};"
sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE ${DB_NAME} TO ${DB_USER};"

log "6. Clone repo"
if [ -d "$APP_DIR/.git" ]; then
  cd "$APP_DIR" && git pull
else
  git clone "$REPO" "$APP_DIR"
fi
cd "$APP_DIR"

log "7. Remove .migration-backup"
rm -rf "$APP_DIR/.migration-backup"

log "8. Patch schema.prisma"
SCHEMA="$APP_DIR/packages/prisma/postgresql/schema.prisma"
if grep -q '^generator effect' "$SCHEMA"; then
  python3 - <<'PYEOF'
import re
path = "/opt/aichatbotpro/packages/prisma/postgresql/schema.prisma"
with open(path) as f:
    content = f.read()
patched = re.sub(r'\ngenerator effect \{[^}]*\}\n', '\n', content)
with open(path, 'w') as f:
    f.write(patched)
print("schema.prisma patched")
PYEOF
fi

log "9. .env.production"
cat > "$APP_DIR/apps/builder/.env.production" <<ENV
DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@localhost:5432/${DB_NAME}
ENCRYPTION_SECRET=${ENCRYPTION_SECRET}
NEXTAUTH_URL=https://${DOMAIN}
NEXT_PUBLIC_VIEWER_URL=https://${DOMAIN}
ADMIN_EMAIL=${ADMIN_EMAIL}
NODE_OPTIONS=--no-node-snapshot
NEXT_TELEMETRY_DISABLED=1
NODE_ENV=production
DEFAULT_WORKSPACE_PLAN=FREE
ENV
echo ".env.production written"

log "10. bun install"
cd "$APP_DIR"
bun install --frozen-lockfile --ignore-scripts

log "11. Compile env package"
cd "$APP_DIR/packages/env"
bun run compile
echo "env compiled"

log "12. Prisma db push + generate"
cd "$APP_DIR"
export DATABASE_URL="postgresql://${DB_USER}:${DB_PASS}@localhost:5432/${DB_NAME}"
PRISMA="$APP_DIR/node_modules/.bin/prisma"
$PRISMA db push --schema=packages/prisma/postgresql/schema.prisma --accept-data-loss
$PRISMA generate --schema=packages/prisma/postgresql/schema.prisma
echo "Prisma done"

log "13. Build embed packages"
cd "$APP_DIR"
node scripts/build-embeds.cjs
echo "Embeds built"

log "14. next build  [takes 5-10 minutes, please wait]"
cd "$APP_DIR/apps/builder"
set -a; source .env.production; set +a
export NODE_OPTIONS="--max-old-space-size=3072 --no-node-snapshot"
"$APP_DIR/node_modules/.bin/next" build
echo "Build complete"

log "15. PM2 setup"
cat > "$APP_DIR/ecosystem.config.js" <<'PM2'
module.exports = {
  apps: [{
    name: "aichatbotpro",
    cwd: "/opt/aichatbotpro/apps/builder",
    script: "/opt/aichatbotpro/node_modules/.bin/next",
    args: "start -p 3000",
    env: {
      PORT: "3000",
      NODE_ENV: "production",
      NODE_OPTIONS: "--no-node-snapshot",
      NEXT_TELEMETRY_DISABLED: "1",
    },
    env_file: "/opt/aichatbotpro/apps/builder/.env.production",
    restart_delay: 5000,
    max_restarts: 10,
    watch: false,
  }],
};
PM2
pm2 delete aichatbotpro 2>/dev/null || true
pm2 start "$APP_DIR/ecosystem.config.js"
pm2 save
pm2 startup systemd -u root --hp /root | tail -1 | bash || true

log "16. Nginx"
cat > /etc/nginx/sites-available/aichatbotpro <<NGINX
server {
    listen 80;
    server_name ${DOMAIN} www.${DOMAIN};
    client_max_body_size 50M;
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade \$http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host \$host;
        proxy_set_header   X-Real-IP \$remote_addr;
        proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto \$scheme;
        proxy_cache_bypass \$http_upgrade;
        proxy_read_timeout 300s;
    }
}
NGINX
ln -sf /etc/nginx/sites-available/aichatbotpro /etc/nginx/sites-enabled/
rm -f /etc/nginx/sites-enabled/default
nginx -t && systemctl reload nginx

log "17. SSL"
SERVER_IP="$(curl -s --max-time 5 ifconfig.me || echo unknown)"
if host "$DOMAIN" 2>/dev/null | grep -q "$SERVER_IP"; then
  certbot --nginx -d "$DOMAIN" -d "www.${DOMAIN}" \
    --email "$ADMIN_EMAIL" --agree-tos --non-interactive
  echo "SSL installed"
else
  echo "DNS not pointing here yet. After updating DNS run:"
  echo "certbot --nginx -d ${DOMAIN} -d www.${DOMAIN} --email ${ADMIN_EMAIL} --agree-tos --non-interactive"
fi

echo ""
echo "================================================"
echo "  Done! App is at: http://${SERVER_IP}"
echo "  Sign in: enter ${ADMIN_EMAIL} at /signin"
echo "  Get your login code: pm2 logs aichatbotpro --lines 50"
echo "================================================"
